services:
  # Backend service
  - type: web
    name: vel-tech-ids-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend service
  - type: web
    name: vel-tech-ids-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: vel-tech-ids-backend
          type: web
          property: host
